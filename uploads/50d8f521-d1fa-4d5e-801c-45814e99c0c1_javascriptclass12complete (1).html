7. program to swap two values
<html>
<head>
<title>First JS program</title>
</head>
<body>
<script type="text/javascript">
document.write("hello");
var a = parseInt(prompt("enter first number"));
var b=parseInt(prompt("enter the second number"));
document.write("value before swap="+a+" " +b);
function swap(a,b){
var temp=a;
a=b;
b=temp;
document.write("value after swap="+a+" "+b);
}
swap(a,b);
</script>
</body>
</html>

8. print natural numbers using all three loops
<html>
<head>
<title>First JS program</title>
</head>

<body>
<script type="text/javascript">
var c=parseInt(prompt("enter 1 , 2 or 3"));
var i;
if(c==1)
{
document.write("print numbers using for loop");
for(i=0;i<=10;i++)
{
	document.write(i+"\n");
	document.write("\n");
}
}
else if(c==2)
{
document.write("print numbers using while loop");
i=1;
while(i<=10)
{
document.write(i+"\n");
i=i+1;
}
}
else{
document.write("print numbers using do while loop");
i=1;
do{
document.write(i+"\n");
i=i+1;
}while(i<=10);
}
</script>
</body>
</html>


9. program to find the factorial of a number
<html>
<head>
<title>First JS program</title>
</head>
<body>
<script type="text/javascript">
var fact=1;
var i=1;
var n=parseInt(prompt("which number factorail"));
if(n==0)
{
document.write("factorial of a number is  1");
}
else
{
for(i=1;i<=n;i++)
{
fact=fact*i;
}
}
document.write("factorial of a number is  "+fact);
</script>
</body>
</html>
